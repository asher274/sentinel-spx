global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'sentinel-trading'
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'sentinel-postgres'
    static_configs:
      - targets: ['sentinel-postgres:5432']

  - job_name: 'sentinel-redis'
    static_configs:
      - targets: ['sentinel-redis:6379']
